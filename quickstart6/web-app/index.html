<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks (OBO)</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>My Tasks</h1>
                <div class="user-info" id="userInfo">Signing in…</div>
            </div>
            <div class="header-right">
                <button class="refresh-btn" id="refreshBtn">↻</button>
            </div>
        </header>

        <div class="identity-card" id="identityCard" style="display:none">
            <div class="identity-label">SQL Server sees you as:</div>
            <div class="identity-value" id="sqlIdentity">…</div>
        </div>

        <form class="add-form" id="addForm" style="display:none">
            <input type="text" id="newTitle" placeholder="What needs to be done?" required>
            <input type="date" id="newDueDate">
            <button type="submit" class="add-btn">Add</button>
        </form>

        <div class="tasks-card" id="tasksList">
            <!-- Tasks will be rendered here -->
        </div>
    </div>

    <div id="debugWrap" style="display:none; width:100%; margin-top:16px; padding:0 1.5rem 1.5rem; box-sizing:border-box; position:relative;">
        <button id="copyLogsBtn" onclick="navigator.clipboard.writeText(document.getElementById('debugLog').textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)})" style="position:absolute;top:6px;right:calc(1.5rem + 6px);background:#333;color:#0f0;border:1px solid #0f0;border-radius:4px;padding:2px 10px;font-size:11px;cursor:pointer;z-index:1">Copy</button>
        <pre id="debugLog" style="background:#1e1e1e;color:#0f0;padding:12px;border-radius:8px;font-size:11px;max-height:200px;overflow:auto;width:100%"></pre>
    </div>

    <script src="auth.js"></script>
    <script src="dab.js"></script>
    <script src="app.js"></script>
</body>
</html>
